<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestor de tareas</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b98a8;
      --accent: #3b82f6;
      --done: #22c55e;
      --border: color-mix(in srgb, var(--text) 12%, transparent);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6f9;
        --card: #ffffff;
        --text: #1a1f26;
        --muted: #5c6773;
        --accent: #2563eb;
        --done: #16a34a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      width: min(36rem, 100%);
      background: var(--card);
      border-radius: 12px;
      padding: 1.75rem 1.5rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 1rem;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .add-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .add-row input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--text) 6%, transparent);
      color: var(--text);
      font-size: 0.95rem;
    }
    .add-row input[type="text"]:focus {
      outline: 2px solid color-mix(in srgb, var(--accent) 55%, transparent);
      outline-offset: 1px;
    }
    button {
      padding: 0.55rem 0.9rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button.small {
      padding: 0.35rem 0.6rem;
      font-size: 0.8rem;
    }
    button.ghost {
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      color: var(--text);
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }
    li:last-child { border-bottom: none; }
    .id {
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 0.8rem;
      min-width: 2rem;
    }
    .texto {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .texto.hecho {
      text-decoration: line-through;
      color: var(--muted);
    }
    .empty {
      color: var(--muted);
      font-size: 0.95rem;
      padding: 0.5rem 0 0.25rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Gestor de tareas</h1>
    <form class="add-row" method="post" action="{{ url_for('main.post_agregar') }}">
      <input type="text" name="texto" placeholder="Nueva tarea…" autocomplete="off" required>
      <button type="submit">Añadir</button>
    </form>
    {% if tareas %}
    <ul>
      {% for t in tareas %}
      <li>
        <span class="id">#{{ t.id }}</span>
        <span class="texto{% if t.completada %} hecho{% endif %}">{{ t.texto }}</span>
        {% if not t.completada %}
        <form method="post" action="{{ url_for('main.post_completar', tarea_id=t.id) }}">
          <button type="submit" class="small ghost">Hecho</button>
        </form>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No hay tareas. Escribe algo arriba y pulsa <strong>Añadir</strong>.</p>
    {% endif %}
  </main>
</body>
</html>
